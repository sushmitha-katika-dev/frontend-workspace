<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id ="title">Welcome to JavaScript</h1>
    <h1 id="heading">Learning DOM</h1>
    <p id="message">Hello World</p>
    <button id="btn">Click Me</button>

    <h2 id="status">Offline</h2>
    <button id="toggleBtn">Go Online/offline</button>
    <br>
    <button id="redBtn">Make Red  & heading red</button>
    <br>
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button id="submitBtn">Submit</button>
    <h1 id="output"></h1>

    <input id="cityInput" placeholder="Enter your city"><p id="cityOutput"></p>

    <input id="ageInput" type="number" placeholder="Enter your age">
    <button id="checkAge">Check Age</button><p id="result"></p>
    <script src="script.js" defer></script>
</body>
</html>
